<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Main Circle Shadow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#0e1726" flood-opacity="0.3" />
    </filter>
    
    <!-- Neon Accent Glow -->
    <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Gradients for the 12 Phases (Wagon Wheel/Color Ring style) -->
    <linearGradient id="day-sky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff7e5f" />
      <stop offset="50%" stop-color="#feb47b" />
      <stop offset="100%" stop-color="#86e3ce" />
    </linearGradient>

    <linearGradient id="night-sky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f2027" />
      <stop offset="50%" stop-color="#203a43" />
      <stop offset="100%" stop-color="#2c5364" />
    </linearGradient>

    <!-- Smooth Drift Gradient for central wave -->
    <linearGradient id="drift-gradient" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#3a1c71" />
      <stop offset="50%" stop-color="#d76d77" />
      <stop offset="100%" stop-color="#ffaf7b" />
    </linearGradient>

    <!-- Gold/Sun Gradient -->
    <linearGradient id="sun-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd200" />
      <stop offset="100%" stop-color="#ff6a00" />
    </linearGradient>

    <!-- Cool Silver/Moon Gradient -->
    <linearGradient id="moon-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eef2f3" />
      <stop offset="100%" stop-color="#8e9eab" />
    </linearGradient>
  </defs>

  <!-- Base Background Wrapper (Dark Circadian Space) -->
  <rect width="512" height="512" rx="64" fill="#080c14" />

  <g filter="url(#glow)" transform="translate(256, 220)">
    <!-- 12-Segment Wagon Wheel/Circadian Dial Ring -->
    <!-- We construct a dash-array circle to perfectly segment the outer dial into 12 phases -->
    <circle cx="0" cy="0" r="140" fill="none" stroke="#121d30" stroke-width="16" />
    
    <!-- Interactive dynamic arc showing day/night shift -->
    <circle cx="0" cy="0" r="140" fill="none" stroke="url(#drift-gradient)" stroke-width="16" 
            stroke-dasharray="146 10" stroke-dashoffset="40" stroke-linecap="round" filter="url(#neon-glow)" />

    <!-- Secondary subtle indicator dots for 12 phases -->
    <g opacity="0.6">
      <circle cx="0" cy="-140" r="3" fill="#ff7e5f" />
      <circle cx="70" cy="-121" r="3" fill="#feb47b" />
      <circle cx="121" cy="-70" r="3" fill="#ffd200" />
      <circle cx="140" cy="0" r="3" fill="#86e3ce" />
      <circle cx="121" cy="70" r="3" fill="#51e2f5" />
      <circle cx="70" cy="121" r="3" fill="#a0e7e5" />
      <circle cx="0" cy="140" r="3" fill="#3a1c71" />
      <circle cx="-70" cy="121" r="3" fill="#6c5ce7" />
      <circle cx="-121" cy="70" r="3" fill="#a29bfe" />
      <circle cx="-140" cy="0" r="3" fill="#fd79a8" />
      <circle cx="-121" cy="-70" r="3" fill="#e84393" />
      <circle cx="-70" cy="-121" r="3" fill="#ff7675" />
    </g>

    <!-- Central Daydrift Double-Wave / Sinusoidal Orbit Line -->
    <!-- Symbolizes the smooth transition and time/color wave mapping -->
    <path d="M -110,0 C -55,-90 55,-90 110,0 C 55,90 -55,90 -110,0 Z" 
          fill="none" stroke="#ffffff" stroke-width="2" opacity="0.15" />
          
    <!-- Sliding Sine Wave Drift Line -->
    <path d="M -100,20 C -50,-60 50,60 100,-20" 
          fill="none" stroke="url(#drift-gradient)" stroke-width="6" stroke-linecap="round" filter="url(#neon-glow)" />

    <!-- Solar Crest (Sun) - Day aspect -->
    <g transform="translate(-45, -25)" filter="url(#neon-glow)">
      <circle cx="0" cy="0" r="26" fill="url(#sun-grad)" />
      <!-- Sun Rays -->
      <path d="M 0,-38 L 0,-32 M 0,38 L 0,32 M -38,0 L -32,0 M 38,0 L 32,0 M -27,-27 L -22,-22 M 27,27 L 22,22 M -27,27 L -22,22 M 27,-27 L 22,-22" 
            stroke="#ffd200" stroke-width="3.5" stroke-linecap="round" />
    </g>

    <!-- Lunar Crest (Crescent Moon) - Night aspect -->
    <g transform="translate(50, 20)" filter="url(#neon-glow)">
      <!-- Moon Path -->
      <path d="M -10,-24 A 24,24 0 1,0 24,10 A 18,18 0 1,1 -10,-24 Z" fill="url(#moon-grad)" />
      <!-- Sparkle/Stars -->
      <path d="M 26,-15 L 28,-11 L 32,-11 L 29,-8 L 30,-4 L 26,-7 L 22,-4 L 23,-8 L 20,-11 L 24,-11 Z" fill="#ffffff" opacity="0.8" transform="scale(0.6) translate(15, -25)" />
    </g>
  </g>

  <!-- Typography Section -->
  <text x="256" y="410" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="32" font-weight="800" letter-spacing="6">
    DAYDRIFT
  </text>
  <text x="256" y="442" text-anchor="middle" fill="#feb47b" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" font-weight="600" letter-spacing="8" opacity="0.9">
    THEME ENGINE
  </text>
</svg>