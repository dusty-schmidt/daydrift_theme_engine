<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1a" />
      <stop offset="100%" stop-color="#141e30" />
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3a1c71" />
      <stop offset="50%" stop-color="#d76d77" />
      <stop offset="100%" stop-color="#ffaf7b" />
    </linearGradient>
    <linearGradient id="sun" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd200" />
      <stop offset="100%" stop-color="#ff6a00" />
    </linearGradient>
    <linearGradient id="moon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eef2f3" />
      <stop offset="100%" stop-color="#8e9eab" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="24" fill="url(#bg)" />

  <!-- Circadian ring -->
  <circle cx="64" cy="58" r="34" fill="none" stroke="#1a2540" stroke-width="4" />
  <circle cx="64" cy="58" r="34" fill="none" stroke="url(#ring)" stroke-width="4"
          stroke-dasharray="36 4" stroke-linecap="round" filter="url(#glow)" />

  <!-- Phase dots -->
  <g opacity="0.5">
    <circle cx="64" cy="24" r="2" fill="#ff7e5f" />
    <circle cx="94" cy="38" r="2" fill="#ffd200" />
    <circle cx="94" cy="78" r="2" fill="#86e3ce" />
    <circle cx="64" cy="92" r="2" fill="#3a1c71" />
    <circle cx="34" cy="78" r="2" fill="#a29bfe" />
    <circle cx="34" cy="38" r="2" fill="#fd79a8" />
  </g>

  <!-- Sine wave -->
  <path d="M 30,58 C 42,38 52,78 64,58 C 76,38 86,78 98,58"
        fill="none" stroke="url(#ring)" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)" />

  <!-- Sun -->
  <g transform="translate(48, 48)" filter="url(#glow)">
    <circle cx="0" cy="0" r="8" fill="url(#sun)" />
    <line x1="0" y1="-12" x2="0" y2="-10" stroke="#ffd200" stroke-width="1.5" stroke-linecap="round" />
    <line x1="0" y1="10" x2="0" y2="12" stroke="#ffd200" stroke-width="1.5" stroke-linecap="round" />
    <line x1="-12" y1="0" x2="-10" y2="0" stroke="#ffd200" stroke-width="1.5" stroke-linecap="round" />
    <line x1="10" y1="0" x2="12" y2="0" stroke="#ffd200" stroke-width="1.5" stroke-linecap="round" />
  </g>

  <!-- Moon -->
  <g transform="translate(80, 66)" filter="url(#glow)">
    <path d="M -3,-7 A 7,7 0 1,0 7,3 A 5.5,5.5 0 1,1 -3,-7 Z" fill="url(#moon)" />
  </g>

  <!-- Label -->
  <text x="64" y="118" text-anchor="middle" fill="#ffffff" font-family="system-ui, sans-serif" font-size="9" font-weight="700" letter-spacing="2" opacity="0.9">DAYDRIFT</text>
</svg>
